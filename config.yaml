server:
  name: "short-link"
  port: "8080"
  base_url: "http://localhost:8080"
  environment: "development"

database:
  url: "postgres://shortlink:shortlink@localhost:5432/shortlink?sslmode=disable"
  pool:
    max_conns: 20
    min_conns: 2

cache:
  enabled: false
  type: "local"
  ttl: 3600
  local:
    size: 1000
  redis:
    addr: "localhost:6379"
    password: ""
    db: 0
    max_memory: "100mb"
